{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="card">
        <div class="card-body">
            <h2 class="card-title mb-4">{% if job %}
    Edit Job
{% else %}
    Add Job
{% endif %}</h2>
            <form method="POST" class="row g-3">
                <div class="col-12">
                    <label for="vehicle_id" class="form-label">Vehicle</label>
                    <select id="vehicle_id" name="vehicle_id" class="form-select" required>
                        <option value="">Select a vehicle</option>
                        {% for vehicle in vehicles %}
                            <option value="{{ vehicle.id }}" {% if job and job.vehicle_id == vehicle.id %}selected{% endif %}>
                                {{ vehicle.registration }} - {{ vehicle.make }} {{ vehicle.model }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-6">
                    <label for="technician" class="form-label">Technician</label>
                    <input id="technician" type="text" name="technician" class="form-control" value="{{ job.technician if job else '' }}" required>
                </div>

                <div class="col-md-3">
                    <label for="status" class="form-label">Status</label>
                    <select id="status" name="status" class="form-select">
                        <option value="Waiting Parts" {% if job and job.status == "Waiting Parts" %}selected{% endif %}>Waiting for Parts</option>
                        <option value="In Progress" {% if job and job.status == "In Progress" %}selected{% endif %}>In Progress</option>
                        <option value="Completed" {% if job and job.status == "Completed" %}selected{% endif %}>Completed</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label for="cost" class="form-label">Cost</label>
                    <div class="input-group">
                        <span class="input-group-text">&pound;</span>
                        <input id="cost" type="number" step="0.01" name="cost" value="{{ job.cost if job else '' }}" class="form-control" required>
                    </div>
                </div>

                <div class="col-12">
                    <button class="btn btn-success" type="submit">{% if job %}
    Update Job
{% else %}
    Add Job
{% endif %}</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
